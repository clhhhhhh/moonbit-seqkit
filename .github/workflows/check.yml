name: MoonBit checks
on: [push, pull_request]
jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
      - name: Install MoonBit on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
      - name: Add MoonBit to PATH on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Add MoonBit to PATH on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: "$env:USERPROFILE\\.moon\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - run: moon fmt
      - run: git diff --exit-code
      - run: moon check --deny-warn
      - run: moon build --target all
      - run: moon test --deny-warn
